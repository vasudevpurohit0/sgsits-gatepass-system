version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: gatepass_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gatepass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gatepass_redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: gatepass_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gatepass_backend
    environment:
      - PORT=5000
      - NODE_ENV=production
      - API_PREFIX=/api/v1
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/gatepass?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_ACCESS_SECRET=access_token_secret_key_change_me_in_prod_123!
      - JWT_REFRESH_SECRET=refresh_token_secret_key_change_me_in_prod_123!
      - QR_ENCRYPTION_KEY=qr_crypto_aes_key_32_bytes_long_keys_!
      - QR_HMAC_SECRET=qr_crypto_hmac_secret_sha256_key_!
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_USE_SSL=false
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET_NAME=ugpms-bucket
      - SMTP_HOST=smtp.mailtrap.io
      - SMTP_PORT=2525
      - SMTP_USER=null
      - SMTP_PASS=null
      - SMTP_FROM=no-reply@university.edu
      - CORS_ORIGIN=http://localhost
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gatepass_frontend
    depends_on:
      - backend

  nginx:
    image: nginx:1.25-alpine
    container_name: gatepass_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
